<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theta Dashboard - Your Investment Hub</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="../static/css/components/sidebar.css">
    <link rel="stylesheet" href="../static/css/components/header.css">
    <script src="../static/js/indexFunction.js"></script>
    <script src="../static/js/utils/theme.js"></script>
</head>
<body>
    <div class="app-container">

        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeMobileSidebar()"></div>
        
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">📈</span>
                    <span class="logo-text">THETA θ</span>
                </div>
            </div>
            
            <ul class="sidebar-nav">
                <li class="nav-item active" data-page="{{ url_for('dashboard', id=user.user_id) }}">
                    <!-- <a href="dashboard.html" target="xspace"></a> -->
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Dashboard</span>
                </li>
                <li class="nav-item" data-page="{{ url_for('portfolio') }}">
                    <span class="nav-icon">💼</span>
                    <span class="nav-text">Portfolio</span>
                </li>
                <li class="nav-item" data-page="{{ url_for('markets')}}">
                    <!-- <a href="markets.html" target="xspace"></a> -->
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Markets</span>
                </li>
                <li class="nav-item" data-page="alerts.html">
                    <span class="nav-icon">🔔</span>
                    <span class="nav-text">Alerts</span>
                </li>
                <li class="nav-item" data-page="{{ url_for('news') }}">
                    <span class="nav-icon">📰</span>
                    <span class="nav-text">News</span>
                </li>
                <li class="nav-item" data-page="settings.html">
                    <span class="nav-icon">⚙️</span>
                    <span class="nav-text">Settings</span>
                </li>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileSidebar()">☰</button>
                    <div>
                        <h1 class="page-title" id="pageTitle">Dashboard</h1>
                        <div class="date-display" id="currentDate"></div>
                    </div>
                </div>
                
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" placeholder="Search stocks, crypto..." id="searchInput">
                        <span class="search-icon">🔍</span>
                        <div class="suggestions-box" id="suggestionsBox"></div>
                    </div>
                    
                    <div class="user-menu">
                        <div class="user-avatar">ZL</div>
                        <span class="user-name">Zayne Li</span>
                    </div>
                </div>
            </header>

            <!-- Iframe Container -->
            <div class="iframe-container">
                <iframe 
                    name="xspace" 
                    id="contentFrame" 
                    src="{{ url_for('dashboard', id=user.user_id) }}" 
                    frameborder="0">
                </iframe>
            </div>
        </main>
    </div>
<script>
    // Mobile sidebar toggle functions
    function toggleMobileSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
            
            // Prevent body scrolling when sidebar is open
            if (sidebar.classList.contains('mobile-open')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = '';
            }
        }
    }
    
    function closeMobileSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (window.innerWidth <= 768) {
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    }
    
    // Close sidebar when clicking on a nav item (mobile)
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                closeMobileSidebar();
            }
        });
    });
    
    // Handle window resize
    window.addEventListener('resize', function() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        
        if (window.innerWidth > 768) {
            sidebar.classList.remove('mobile-open');
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
</script>   
</body>
</html>
